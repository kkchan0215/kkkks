<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유니콘 배지 인증</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffeef7;
    font-family:"Malgun Gothic",sans-serif;
}

.box{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
    width:330px;
}

h2{
    color:#ff66b2;
}

input{
    width:220px;
    padding:15px;
    font-size:28px;
    text-align:center;
    border-radius:15px;
    border:2px solid #ffb6d9;
    outline:none;
}

button{
    margin-top:20px;
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:15px;
    background:#ff66b2;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>🦄 유니콘 배지 인증</h2>

<input id="code" maxlength="4" placeholder="코드 입력">

<br>

<button onclick="checkCode()">인증</button>

<div id="result"></div>

</div>

<script>

const codes=[
"5457",
"2463",
"6743",
"9323",
"0487"
];

function checkCode(){

const input=document.getElementById("code").value.trim();

if(codes.includes(input)){
document.getElementById("result").innerHTML="✅ 인식되었습니다!";
document.getElementById("result").style.color="green";
}else{
document.getElementById("result").innerHTML="❌ 인식되지 않았습니다.";
document.getElementById("result").style.color="red";
}

}

</script>

</body>
</html>
