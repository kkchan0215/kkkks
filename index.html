<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 영상</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f7f7;
    font-family:"맑은 고딕",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:1000px;
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.title{
    text-align:center;
    font-size:48px;
    font-weight:bold;
    margin-bottom:20px;
}

.sub{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.video{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    border-radius:15px;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#888;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <div class="title">🎬 오늘의 영상</div>

    <div class="sub">
        한화이글스 영상 예시
    </div>

    <iframe
        class="video"
        src="https://www.youtube.com/embed/PDpZnUtI6ew"
        title="오늘의 영상"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>

    <div class="footer">
        영상은 언제든지 다른 유튜브 영상으로 변경 가능
    </div>

</div>

</body>
</html>
