<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올리 숫자</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fffafc;
    font-family:'Jua', sans-serif;
    overflow:hidden;
}

#number{
    font-size:120px;
    color:#ff6bb5;
    user-select:none;
}

#end{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:70px;
    color:#ff4081;
    display:none;
    text-align:center;
}
</style>
</head>
<body>

<div id="number">0</div>
<div id="end">🎉 끝! 100000 달성! 🎉</div>

<script>
let num = 0;
const max = 100000;

const numberEl = document.getElementById("number");
const endEl = document.getElementById("end");

function update() {
    if(num < 0) num = 0;

    if(num >= max){
        num = max;
        numberEl.style.display = "none";
        endEl.style.display = "block";
    } else {
        numberEl.textContent = num.toLocaleString();
    }
}

document.addEventListener("keydown", (e) => {

    if(num >= max) return;

    // 증가
    if(e.code === "Space"){
        e.preventDefault();
        num += 1;
    }

    if(e.key === "1") num += 100;
    if(e.key === "2") num += 500;
    if(e.key === "3") num += 1000;
    if(e.key === "4") num += 3000;
    if(e.key === "5") num += 5000;
    if(e.key === "6") num += 10000;

    // 감소
    if(e.key === "7") num -= 100;
    if(e.key === "8") num -= 500;
    if(e.key === "9") num -= 1000;
    if(e.key === "0") num -= 3000;
    if(e.key === "-") num -= 5000;
    if(e.key === "=") num -= 10000;


    update();
});

update();
</script>

</body>
</html>
