<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 영상</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#FFF4B8;
    font-family:'Gaegu',cursive;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:1000px;
}

h1{
    text-align:center;
    font-size:55px;
    margin-bottom:15px;
}

iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    border-radius:25px;
}
</style>
</head>
<body>

<div class="container">
    <h1>📺 오늘의 영상</h1>

    <iframe id="videoFrame" allowfullscreen></iframe>
</div>

<script>
// 여기에 유튜브 링크 전체를 넣으면 됨
const youtubeLink = "https://youtu.be/Hoo-v7iToS4?si=nI9t2PipZoibh9bg";

const videoId = youtubeLink.match(
    /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/
)?.[1];

document.getElementById("videoFrame").src =
    "https://www.youtube.com/embed/" + videoId + "?rel=0";
</script>

</body>
</html>
