<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 영상</title>

<style>
body{
    margin:0;
    font-family:"맑은 고딕", sans-serif;
    background:#f7f7f7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    width:90%;
    max-width:800px;
    text-align:center;
}

h1{
    margin-top:0;
    font-size:40px;
}

input{
    width:80%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    margin-left:5px;
}

iframe{
    width:100%;
    height:450px;
    border:none;
    border-radius:15px;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="box">
    <h1>🎬 오늘의 영상</h1>

    <input id="videoUrl" placeholder="유튜브 링크를 입력하세요">
    <button onclick="loadVideo()">시청하기</button>

    <iframe id="player" src=""></iframe>
</div>

<script>
function loadVideo(){
    let url = document.getElementById("videoUrl").value;

    let match = url.match(/(?:v=|youtu\.be\/)([^&]+)/);

    if(match){
        let videoId = match[1];
        document.getElementById("player").src =
        "https://www.youtube.com/embed/" + videoId;
    }else{
        alert("유튜브 링크를 입력해주세요!");
    }
}
</script>

</body>
</html>
