<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 영상</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#FFF4B8;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:'Gaegu', cursive;
}

h1{
    font-size:55px;
    margin-bottom:15px;
}

.video-box{
    width:95%;
    max-width:1000px;
}

iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    border-radius:25px;
    background:white;
}
</style>
</head>
<body>

<h1>📺 오늘의 영상</h1>

<div class="video-box">
    <iframe
        src="https://www.youtube.com/embed/PDpZnUtI6ew?rel=0"
        title="오늘의 영상"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
